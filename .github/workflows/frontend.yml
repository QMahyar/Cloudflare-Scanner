name: Frontend

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'ui/dist/**'
  pull_request:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'ui/dist/**'

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
