name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  vet:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go vet ./...
      - run: go build -ldflags="-s -w" -o Cloudflare-Scanner.exe .
      - run: dir Cloudflare-Scanner.exe
