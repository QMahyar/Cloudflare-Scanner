name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.1.0)'
        required: true
      description:
        description: 'Release notes (markdown)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags="-s -w" -o Cloudflare-Scanner.exe .

      - name: Download xray-core
        run: |
          $url = "https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-windows-64.zip"
          $zip = "$env:RUNNER_TEMP\xray.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\xray"
          Copy-Item "$env:RUNNER_TEMP\xray\xray.exe" -Destination xray.exe

      - name: Package
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") { $tag = "v${{ inputs.version }}" }
          Compress-Archive -Path Cloudflare-Scanner.exe, xray.exe -DestinationPath "Cloudflare-Scanner-$tag.zip"

      # ── Manual dispatch ──
      - name: Create Release (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${{ inputs.version }}"
          $title = "Cloudflare Scanner $tag"
          $body = "${{ inputs.description }}"
          if ($body -eq "") { $body = "Release $tag" }
          $bodyFile = "$env:RUNNER_TEMP\release-body.md"
          $body | Out-File -FilePath $bodyFile -Encoding utf8
          gh release create $tag --target ${{ github.sha }} --title "$title" --notes-file $bodyFile
          gh release upload $tag "Cloudflare-Scanner-$tag.zip" --clobber

      # ── Tag push ──
      - name: Create Release (tag)
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          name: Cloudflare Scanner ${{ github.ref_name }}
          body: |
            ## Cloudflare Scanner ${{ github.ref_name }}

            Download `Cloudflare-Scanner-${{ github.ref_name }}.zip`, extract, and run `Cloudflare-Scanner.exe`.
            xray-core is included — no extra downloads needed.
          files: Cloudflare-Scanner-*.zip
          draft: false
          prerelease: false
