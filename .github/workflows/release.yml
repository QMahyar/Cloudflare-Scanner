name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.1.0)'
        required: true
      description:
        description: 'Release notes (markdown)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            xray_url: https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-windows-64.zip
            xray_in: xray.exe
            platform: windows-amd64

          - os: windows-latest
            goos: windows
            goarch: arm64
            ext: .exe
            xray_url: https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-windows-arm64-v8a.zip
            xray_in: xray.exe
            platform: windows-arm64

          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            xray_url: https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-linux-64.zip
            xray_in: xray
            platform: linux-amd64

          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
            xray_url: https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-linux-arm64-v8a.zip
            xray_in: xray
            platform: linux-arm64

          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
            xray_url: https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-android-arm64-v8a.zip
            xray_in: xray
            platform: termux-arm64

          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            xray_url: https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-macos-64.zip
            xray_in: xray
            platform: darwin-amd64

          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            xray_url: https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-macos-arm64-v8a.zip
            xray_in: xray
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./...
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Build
        run: go build -ldflags="-s -w" -o Cloudflare-Scanner${{ matrix.ext }} .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Download xray-core
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          curl -sL "${{ matrix.xray_url }}" -o xray.zip
          unzip -o xray.zip ${{ matrix.xray_in }}
          mkdir -p "${{ github.workspace }}/xray-bin"
          cp ${{ matrix.xray_in }} "${{ github.workspace }}/xray-bin/"

      - name: Package
        shell: bash
        run: |
          cd "${{ github.workspace }}"
          tag="${{ github.ref_name }}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && tag="v${{ inputs.version }}"
          cp xray-bin/${{ matrix.xray_in }} xray${{ matrix.ext }}
          tar -czf "Cloudflare-Scanner-$tag-${{ matrix.platform }}.tar.gz" Cloudflare-Scanner${{ matrix.ext }} xray${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: Cloudflare-Scanner-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Generate release body
        id: body
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && TAG="v${{ inputs.version }}"
          cat > release-body.md << EOF
          ## Downloads

          Each archive includes the app binary + **xray-core v1.8.24** — nothing else to download.

          | Platform | Arch | File |
          |----------|------|------|
          | 🪟 Windows | amd64 | \`Cloudflare-Scanner-${TAG}-windows-amd64.tar.gz\` |
          | 🪟 Windows | arm64 | \`Cloudflare-Scanner-${TAG}-windows-arm64.tar.gz\` |
          | 🐧 Linux | amd64 | \`Cloudflare-Scanner-${TAG}-linux-amd64.tar.gz\` |
          | 🐧 Linux | arm64 | \`Cloudflare-Scanner-${TAG}-linux-arm64.tar.gz\` |
          | 🍎 macOS (Intel) | amd64 | \`Cloudflare-Scanner-${TAG}-darwin-amd64.tar.gz\` |
          | 🍎 macOS (Apple Silicon) | arm64 | \`Cloudflare-Scanner-${TAG}-darwin-arm64.tar.gz\` |
          | 📱 Termux / Android | arm64 | \`Cloudflare-Scanner-${TAG}-termux-arm64.tar.gz\` |

          ## Quick Start

          | Platform | Command |
          |----------|---------|
          | **Windows** | Extract \`.tar.gz\`, double-click \`Cloudflare-Scanner.exe\` |
          | **Linux / macOS** | \`tar -xzf *.tar.gz && chmod +x Cloudflare-Scanner xray && ./Cloudflare-Scanner\` |
          | **Termux** | \`curl -sL https://raw.githubusercontent.com/QMahyar/Cloudflare-Scanner/master/scripts/termux-setup.sh | sh\` then \`scan\` |

          ## What's Changed

          EOF
          echo "**Full changelog:** https://github.com/QMahyar/Cloudflare-Scanner/releases" >> release-body.md

      # ── Tag push ──
      - name: Create Release (tag)
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          name: Cloudflare Scanner ${{ github.ref_name }}
          body_path: release-body.md
          files: Cloudflare-Scanner-*.tar.gz
          draft: false
          prerelease: false

      # ── Manual dispatch ──
      - name: Create Release (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ inputs.version }}"
          title="Cloudflare Scanner $tag"
          cat release-body.md > final-body.md
          if [ -n "${{ inputs.description }}" ]; then
            echo "" >> final-body.md
            echo "${{ inputs.description }}" >> final-body.md
          fi
          gh release create "$tag" --target "${{ github.sha }}" --title "$title" --notes-file final-body.md
          gh release upload "$tag" Cloudflare-Scanner-*.tar.gz --clobber
