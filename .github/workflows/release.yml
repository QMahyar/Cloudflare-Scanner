name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags="-s -w" -o Cloudflare-Scanner.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cloudflare Scanner ${{ github.ref_name }}
          body: |
            ## Cloudflare Scanner ${{ github.ref_name }}

            ### Changes
            See the [commit log](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ### Usage
            Download `Cloudflare-Scanner.exe`, place it anywhere, and run it.
            xray-core will be auto-downloaded on first launch.
          files: Cloudflare-Scanner.exe
          draft: false
          prerelease: false
