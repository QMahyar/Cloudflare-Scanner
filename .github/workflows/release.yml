name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number — no "v" prefix (e.g. 2.1.0)'
        required: true
      changelog:
        description: "What's changed — markdown (leave empty to auto-generate from git log)"
        required: false
        default: ''

env:
  XRAY_VERSION: v1.8.24

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            xray_in: xray.exe
            xray_zip: Xray-windows-64.zip
            platform: windows-amd64

          - os: windows-latest
            goos: windows
            goarch: arm64
            ext: .exe
            xray_in: xray.exe
            xray_zip: Xray-windows-arm64-v8a.zip
            platform: windows-arm64

          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            xray_in: xray
            xray_zip: Xray-linux-64.zip
            platform: linux-amd64

          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
            xray_in: xray
            xray_zip: Xray-linux-arm64-v8a.zip
            platform: linux-arm64

          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
            xray_in: xray
            xray_zip: Xray-android-arm64-v8a.zip
            platform: termux-arm64

          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            xray_in: xray
            xray_zip: Xray-macos-64.zip
            platform: darwin-amd64

          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            xray_in: xray
            xray_zip: Xray-macos-arm64-v8a.zip
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          # VERSION file is the single source of truth. The tag (or dispatch
          # input) must match it, so the version can't drift between files.
          BASE=$(tr -d ' \t\r\n' < VERSION)
          TAG="v${BASE#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            if [ "v${{ inputs.version }}" != "$TAG" ]; then
              echo "::error::workflow_dispatch version '${{ inputs.version }}' does not match VERSION file ('$BASE'). Bump VERSION or fix the input."
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref_name }}" != "$TAG" ]; then
              echo "::error::Pushed tag '${{ github.ref_name }}' does not match VERSION file ('$TAG'). Bump VERSION and re-tag so they match."
              exit 1
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Vet
        run: go vet ./...
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Build
        shell: bash
        run: |
          go build \
            -ldflags="-s -w -X 'main.Version=${{ steps.ver.outputs.tag }}'" \
            -o "Cloudflare-Scanner${{ matrix.ext }}" .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Download xray-core
        shell: bash
        run: |
          XRAY_URL="https://github.com/XTLS/Xray-core/releases/download/${{ env.XRAY_VERSION }}/${{ matrix.xray_zip }}"
          curl -fsSL "$XRAY_URL" -o xray.zip
          unzip -o xray.zip "${{ matrix.xray_in }}"
          chmod +x "${{ matrix.xray_in }}" 2>/dev/null || true

      - name: Package
        shell: bash
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          PLAT="${{ matrix.platform }}"
          APP="Cloudflare-Scanner${{ matrix.ext }}"
          XRAY="${{ matrix.xray_in }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "Cloudflare-Scanner-${TAG}-${PLAT}.zip" "$APP" "$XRAY"
          else
            tar -czf "Cloudflare-Scanner-${TAG}-${PLAT}.tar.gz" "$APP" "$XRAY"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: Cloudflare-Scanner-*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          # VERSION file is the single source of truth. The tag (or dispatch
          # input) must match it, so the version can't drift between files.
          BASE=$(tr -d ' \t\r\n' < VERSION)
          TAG="v${BASE#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            if [ "v${{ inputs.version }}" != "$TAG" ]; then
              echo "::error::workflow_dispatch version '${{ inputs.version }}' does not match VERSION file ('$BASE'). Bump VERSION or fix the input."
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref_name }}" != "$TAG" ]; then
              echo "::error::Pushed tag '${{ github.ref_name }}' does not match VERSION file ('$TAG'). Bump VERSION and re-tag so they match."
              exit 1
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          sha256sum Cloudflare-Scanner-* | tee checksums.txt

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          MANUAL="${{ inputs.changelog }}"

          if [ -n "$MANUAL" ]; then
            echo "$MANUAL" > changelog.md
          else
            # Auto-generate from commits since the previous tag
            PREV=$(git describe --abbrev=0 --tags HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
            {
              echo "### Commits since $PREV"
              echo ""
              git log --pretty=format:"- %s" "$PREV..HEAD" | grep -v "^- docs:" | head -30
            } > changelog.md
          fi
          cat changelog.md

      - name: Generate release body
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          XRAY: ${{ env.XRAY_VERSION }}
          REPO: ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import os, textwrap

          tag  = os.environ['TAG']
          xray = os.environ['XRAY']
          repo = os.environ['REPO']
          raw  = f"https://raw.githubusercontent.com/{repo}/master"

          with open('changelog.md') as f:
              changelog = f.read().strip()

          body = textwrap.dedent(f"""\
          ## Downloads

          Each archive includes **Cloudflare Scanner {tag}** + **xray-core {xray}** — no separate download needed.

          | Platform | Architecture | File |
          |----------|-------------|------|
          | 🪟 Windows | x86-64 | `Cloudflare-Scanner-{tag}-windows-amd64.zip` |
          | 🪟 Windows | ARM64 | `Cloudflare-Scanner-{tag}-windows-arm64.zip` |
          | 🐧 Linux | x86-64 | `Cloudflare-Scanner-{tag}-linux-amd64.tar.gz` |
          | 🐧 Linux | ARM64 / Raspberry Pi | `Cloudflare-Scanner-{tag}-linux-arm64.tar.gz` |
          | 🍎 macOS | Intel (x86-64) | `Cloudflare-Scanner-{tag}-darwin-amd64.tar.gz` |
          | 🍎 macOS | Apple Silicon | `Cloudflare-Scanner-{tag}-darwin-arm64.tar.gz` |
          | 📱 Termux / Android | ARM64 | `Cloudflare-Scanner-{tag}-termux-arm64.tar.gz` |

          ## One-Liner Install

          ```powershell
          # Windows (PowerShell — run as Administrator)
          irm {raw}/scripts/install-windows.ps1 | iex
          ```

          ```sh
          # Linux
          curl -fsSL {raw}/scripts/install-linux.sh | sh

          # macOS
          curl -fsSL {raw}/scripts/install-macos.sh | sh

          # Termux / Android
          curl -fsSL {raw}/scripts/termux-setup.sh | sh
          ```

          ## Verify Downloads

          ```sh
          # Linux / macOS
          sha256sum -c checksums.txt

          # Windows (PowerShell)
          Get-FileHash Cloudflare-Scanner-{tag}-windows-amd64.zip | Format-List
          ```

          ## What's Changed

          {changelog}

          ---
          **Full changelog:** https://github.com/{repo}/blob/master/CHANGELOG.md
          """)

          with open('release-body.md', 'w') as f:
              f.write(body)
          print("Release body generated.")
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Cloudflare Scanner ${{ steps.ver.outputs.tag }}
          body_path: release-body.md
          files: |
            Cloudflare-Scanner-*.zip
            Cloudflare-Scanner-*.tar.gz
            checksums.txt
          draft: false
          prerelease: false
